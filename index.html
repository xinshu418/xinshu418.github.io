<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta id="meta-description" name="description" content="个人学术主页">
    <link id="canonical-link" rel="canonical" href="">
    <title>个人学术主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
            --accent: #3b82f6;
        }

        html {
            scroll-behavior: smooth;
        }

        section[id] {
            scroll-margin-top: 5rem;
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
        }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 10%), 0 10px 10px -5px rgb(0 0 0 / 4%);
        }

        .nav-link[aria-current="true"] {
            color: var(--accent);
        }

        @media (max-width: 767px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 4rem;
                left: 0;
                right: 0;
                flex-direction: column;
                gap: 0;
                padding: 0.5rem 1rem 1rem;
                background: white;
                box-shadow: 0 8px 12px rgb(0 0 0 / 8%);
            }

            .nav-links.is-open {
                display: flex;
            }

            .nav-links a {
                padding: 0.75rem 0;
            }
        }

        @media (min-width: 768px) {
            .nav-links {
                display: flex;
                align-items: center;
                gap: 2rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            .card-hover {
                transition: none;
            }

            .card-hover:hover {
                transform: none;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
    <div id="config-status" class="bg-blue-50 px-4 py-2 text-center text-sm text-blue-800" role="status">
        正在加载网站配置…
    </div>

    <nav class="sticky top-0 z-50 bg-white shadow-sm" aria-label="主导航">
        <div class="relative mx-auto flex h-16 max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <a id="site-name" href="#hero" class="text-xl font-bold text-gray-800">个人主页</a>
            <button id="nav-toggle" type="button" class="rounded p-2 text-gray-700 md:hidden" aria-expanded="false" aria-controls="nav-links" aria-label="打开导航菜单">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <div id="nav-links" class="nav-links"></div>
        </div>
    </nav>

    <main>
        <section id="hero" data-section="hero" class="gradient-bg py-20 text-white">
            <div id="hero-content" class="mx-auto max-w-6xl px-4 text-center sm:px-6 lg:px-8"></div>
        </section>

        <section id="about" data-section="about" class="bg-white py-16">
            <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
                <h2 class="mb-8 text-3xl font-bold">关于我</h2>
                <div id="about-content" class="grid gap-8 md:grid-cols-2"></div>
            </div>
        </section>

        <section id="research" data-section="research" class="bg-gray-50 py-16">
            <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
                <h2 class="mb-8 text-3xl font-bold">研究方向</h2>
                <div id="research-content" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
            </div>
        </section>

        <section id="publications" data-section="publications" class="bg-white py-16">
            <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
                <h2 class="mb-8 text-3xl font-bold">发表论文</h2>
                <div id="publications-content" class="space-y-4"></div>
            </div>
        </section>

        <section id="projects" data-section="projects" class="bg-gray-50 py-16">
            <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
                <h2 class="mb-8 text-3xl font-bold">研究项目</h2>
                <div id="projects-content" class="grid gap-6 md:grid-cols-2"></div>
            </div>
        </section>

        <section id="contact" data-section="contact" class="bg-white py-16">
            <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
                <h2 class="mb-8 text-3xl font-bold">联系方式</h2>
                <div id="contact-content" class="grid gap-8 md:grid-cols-2"></div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-800 py-8 text-center text-white">
        <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
            <p id="footer-copyright"></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>
